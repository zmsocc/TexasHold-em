<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>注册 - 德州扑克</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f, #0f1f33);
            min-height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .captcha-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .captcha-group input {
            flex: 1;
        }
        .captcha-img {
            width: 120px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
        .captcha-img img {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary {
            background: #28a745;
            color: white;
        }
        .btn-primary:hover {
            background: #218838;
            transform: scale(1.02);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #545b62;
            transform: scale(1.02);
        }
        .link {
            text-align: center;
            margin-top: 20px;
        }
        .link a {
            color: #007bff;
            text-decoration: none;
        }
        .link a:hover {
            text-decoration: underline;
        }
        .error {
            background: #dc3545;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 注册</h1>
        <div class="error" id="error"></div>
        <form id="registerForm">
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="nickname" placeholder="请输入昵称" required>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required minlength="6">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
            </div>
            <div class="form-group">
                <label>验证码</label>
                <div class="captcha-group">
                    <input type="text" id="captcha" placeholder="请输入验证码" required maxlength="4">
                    <div class="captcha-img" id="captchaImg" onclick="refreshCaptcha()" title="点击刷新">
                        点击获取
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">注册</button>
        </form>
        <div class="link">
            <p>已有账号？<a href="/login">立即登录</a></p>
        </div>
    </div>

    <script>
        // 页面加载时获取验证码
        window.onload = function() {
            refreshCaptcha();
        };

        function refreshCaptcha() {
            const captchaImg = document.getElementById('captchaImg');
            captchaImg.innerHTML = '加载中...';
            
            fetch('/api/captcha')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        captchaImg.innerHTML = `<img src="${data.image}" alt="验证码" onclick="event.stopPropagation(); refreshCaptcha()">`;
                    } else {
                        captchaImg.innerHTML = '获取失败';
                    }
                })
                .catch(() => {
                    captchaImg.innerHTML = '获取失败';
                });
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nickname = document.getElementById('nickname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const captcha = document.getElementById('captcha').value;

            if (password !== confirmPassword) {
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = '两次输入的密码不一致';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, email, password, captcha })
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = '/login?success=' + encodeURIComponent('注册成功，请登录');
                } else {
                    const errorDiv = document.getElementById('error');
                    errorDiv.textContent = result.message || '注册失败';
                    errorDiv.style.display = 'block';
                    refreshCaptcha();
                }
            } catch (error) {
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = '网络错误，请重试';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
