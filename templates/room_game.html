<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房间游戏 - 德州扑克</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f, #0f1f33);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .table {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 675px;
            margin: 0 auto;
            background: url('/zhuomian.png') center/contain no-repeat;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .players-top {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .players-bottom {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .player {
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            min-width: 130px;
            transition: all 0.3s;
            position: relative;
        }
        .player.me {
            border: 2px solid #28a745;
        }
        .player.current {
            border: 3px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            animation: pulse 1s infinite;
        }
        .player.folded {
            opacity: 0.5;
        }
        .dealer-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ffd700;
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            z-index: 10;
        }
        .sb-badge, .bb-badge {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            z-index: 10;
        }
        .sb-badge {
            background: #17a2b8;
            color: white;
        }
        .bb-badge {
            background: #dc3545;
            color: white;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 0, 0.7); }
        }
        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 20px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        .player-timer {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 3px;
        }
        .player-chips {
            color: #ffd700;
            margin-bottom: 5px;
        }
        .player-cards {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .card {
            width: 50px;
            height: 70px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .community {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            justify-content: center;
            align-items: flex-start;
        }
        .community-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .community-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .community-label {
            font-size: 14px;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }
        .community .card {
            width: 80px;
            height: 112px;
        }
        .pot {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .phase {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 18px;
        }
        .message {
            position: absolute;
            bottom: 0%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 22px;
            max-width: 80%;
            text-align: center;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .controls {
            margin-top: 30px;
            text-align: center;
        }
        .btn {
            padding: 12px 24px;
            margin: 5px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover:not(:disabled) {
            transform: scale(1.05);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-fold {
            background: #dc3545;
            color: white;
        }
        .btn-check {
            background: #17a2b8;
            color: white;
        }
        .btn-call {
            background: #28a745;
            color: white;
        }
        .btn-raise {
            background: #ffc107;
            color: black;
        }
        .btn-allin {
            background: #fd7e14;
            color: white;
        }
        .btn-leave {
            background: rgba(220, 53, 69, 0.8);
            color: white;
            padding: 10px 20px;
            font-size: 14px;
        }
        .btn-leave:hover {
            background: #dc3545;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
        }
        .room-info {
            font-size: 18px;
        }
        .timer-display {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
        }
        .table-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 200px;
        }
        .table-modal-content {
            background: #1e3a5f;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 350px;
        }
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
        }
        .connected {
            background: rgba(40, 167, 69, 0.3);
            color: #28a745;
        }
        .disconnected {
            background: rgba(220, 53, 69, 0.3);
            color: #dc3545;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding-top: 400px;
            z-index: 1000;
        }
        .modal-content {
            background: #1e3a5f;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            border: 2px solid #ffd700;
        }
    </style>
</head>
<body>
    <div class="connection-status disconnected" id="connectionStatus">🔴 未连接</div>
    
    <div class="container">
        <div class="header">
            <div class="room-info">房间: <span id="roomId">-</span></div>
            <div class="timer-display" id="timer">--</div>
            <button class="btn btn-leave" onclick="leaveRoom()">🚪 离开房间</button>
        </div>
        
        <h1>🎴 德州扑克 🎴</h1>
        
        <div class="players-top" id="playersTop"></div>
        
        <div class="table" id="table">
            <div class="phase" id="phase" style="display: none;">准备开始</div>
            <div class="pot" id="pot" style="display: none;">底池: 0</div>
            <div class="community" id="community" style="display: none;"></div>
            <div class="message" id="message" style="display: none;"></div>
            <div class="table-modal" id="tableModal" style="display: none;">
                <div class="table-modal-content" id="tableModalContent"></div>
            </div>
        </div>
        
        <div class="players-bottom" id="playersBottom"></div>
        
        <div class="controls" id="controls">
            <div style="font-size: 18px;">等待游戏开始...</div>
        </div>
    </div>

    <!-- 加注模态框 -->
    <div class="modal" id="raiseModal">
        <div class="modal-content">
            <h2 style="color: #ffd700; margin-bottom: 20px;">选择加注金额</h2>
            <div id="raiseOptions" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px;"></div>
            <div style="margin-top: 20px;">
                <input type="number" id="customRaiseAmount" placeholder="自定义金额" style="padding: 10px; font-size: 16px; width: 150px; margin-right: 10px; border-radius: 8px; border: 2px solid #ffd700; text-align: center;">
                <button class="btn btn-call" onclick="submitCustomRaise()">确认</button>
                <button class="btn btn-fold" onclick="closeRaiseModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 游戏结束模态框 -->
    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2 style="color: #ffd700; margin-bottom: 20px;">游戏结束</h2>
            <div id="gameOverMessage" style="font-size: 18px; margin-bottom: 25px; line-height: 1.6;"></div>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn btn-check" onclick="goHome()">返回首页</button>
                <button class="btn btn-call" onclick="goBackToRoom()">返回房间</button>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        let ws = null;
        let roomId = null;
        let gameState = null;
        let isMyTurn = false;
        let timeLeft = 0;
        let timerInterval = null;
        let currentUserId = null;
        let minRaise = 20;
        let maxRaise = 0;
        let showdownData = null;
        let hasOtherAllin = false;

        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function init() {
            roomId = getUrlParam('room_id');
            if (!roomId) {
                alert('房间号不能为空');
                window.location.href = '/';
                return;
            }

            document.getElementById('roomId').textContent = roomId;
            connectWebSocket();
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('WebSocket connected');
                updateConnectionStatus(true);
                
                ws.send(JSON.stringify({
                    event: 'join_room',
                    room_id: roomId
                }));

                setTimeout(() => {
                    ws.send(JSON.stringify({
                        event: 'join_game'
                    }));
                }, 500);
            };

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                handleWebSocketMessage(msg);
            };

            ws.onclose = function() {
                console.log('WebSocket disconnected');
                updateConnectionStatus(false);
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }

        function handleWebSocketMessage(msg) {
            console.log('收到WebSocket消息:', msg.event, msg);
            switch (msg.event) {
                case 'waiting_for_game':
                    showMessage('等待游戏开始...');
                    break;

                case 'hand_started':
                    showMessage('游戏开始！');
                    // 重置其他玩家全下状态
                    hasOtherAllin = false;
                    break;

                case 'hole_cards':
                    console.log('收到手牌:', msg.data.cards);
                    break;

                case 'game_state':
                    console.log('收到游戏状态:', msg.data);
                    updateGameState(msg.data);
                    break;

                case 'player_turn':
                    // 保存是否有其他玩家全下的状态
                    hasOtherAllin = msg.data.has_other_allin || false;
                    if (msg.data.user_id === currentUserId) {
                        isMyTurn = true;
                        startTimer(msg.data.time_left || 60);
                        showMessage('轮到您操作！');
                    } else {
                        isMyTurn = false;
                        stopTimer();
                        showMessage(`轮到 ${msg.data.nickname} 操作`);
                    }
                    if (gameState && gameState.players) {
                        gameState.current_player = msg.data.user_id;
                        const allPlayers = gameState.players;
                        const topPlayers = allPlayers.slice(0, Math.ceil(allPlayers.length / 2));
                        const bottomPlayers = allPlayers.slice(Math.ceil(allPlayers.length / 2));
                        renderPlayers('playersTop', topPlayers, msg.data.user_id);
                        renderPlayers('playersBottom', bottomPlayers, msg.data.user_id);
                    }
                    break;

                case 'action_result':
                    showMessage(`${msg.data.nickname} ${getActionName(msg.data.action)}`);
                    document.getElementById('pot').textContent = '底池: ' + (msg.data.pot || 0);
                    break;

                case 'community_cards':
                    updateCommunityCards(msg.data.cards);
                    showMessage(msg.data.phase === 'flop' ? '翻牌圈' : 
                               msg.data.phase === 'turn' ? '转牌圈' : '河牌圈');
                    break;

                case 'showdown_result':
                    showdownData = msg.data;
                    
                    showMessage(`获胜者: ${msg.data.winners.map(w => {
                        const player = gameState.players.find(p => p.user_id === w);
                        return player ? player.nickname : w;
                    }).join(', ')} - ${msg.data.best_rank || ''}`);
                    
                    if (msg.data.hands) {
                        updatePlayerHands(msg.data.hands);
                    }
                    
                    if (gameState && gameState.community_cards) {
                        updateCommunityCards(gameState.community_cards);
                    }
                    
                    setTimeout(() => {
                        showGameOverModal();
                    }, 5000);
                    break;

                case 'game_over':
                    showMessage('游戏结束!');
                    setTimeout(() => {
                        showGameOverModal();
                    }, 1000);
                    break;

                case 'action_error':
                    alert(msg.data.error);
                    break;
            }
        }

        function updateGameState(state) {
            if (!state) return;
            gameState = state;

            document.getElementById('phase').textContent = getPhaseName(state.phase || '准备开始');
            document.getElementById('phase').style.display = 'block';
            document.getElementById('pot').textContent = '底池: ' + (state.pot || 0);
            document.getElementById('pot').style.display = 'block';
            document.getElementById('community').style.display = 'flex';

            updateCommunityCards(state.community_cards);

            const allPlayers = state.players || [];
            const topPlayers = allPlayers.slice(0, Math.ceil(allPlayers.length / 2));
            const bottomPlayers = allPlayers.slice(Math.ceil(allPlayers.length / 2));

            renderPlayers('playersTop', topPlayers, state.current_player);
            renderPlayers('playersBottom', bottomPlayers, state.current_player);

            if (currentUserId && state.current_player === currentUserId) {
                if (!isMyTurn) {
                    isMyTurn = true;
                    startTimer(60);
                    showMessage('轮到您操作！');
                }
            }

            updateControls(state);
        }

        function getPhaseName(phase) {
            const names = {
                'preflop': '翻牌前',
                'flop': '翻牌圈',
                'turn': '转牌圈',
                'river': '河牌圈',
                'showdown': '摊牌'
            };
            return names[phase] || phase;
        }

        function updateCommunityCards(cards) {
            const communityDiv = document.getElementById('community');
            communityDiv.innerHTML = '';

            const cardsToShow = cards || ['bm.png','bm.png','bm.png','bm.png','bm.png'];
            const limitedCards = cardsToShow.slice(0, 5);
            limitedCards.forEach(card => {
                const img = document.createElement('img');
                img.src = '/' + card;
                img.className = 'card';
                communityDiv.appendChild(img);
            });

            if (showdownData && showdownData.showdown_cards && showdownData.showdown_cards.length > 0) {
                const winnerSection = document.createElement('div');
                winnerSection.className = 'community-section';
                winnerSection.style.marginTop = '10px';
                
                const winnerLabel = document.createElement('div');
                winnerLabel.className = 'community-label';
                if (showdownData.winner_name && showdownData.winner_hand_rank) {
                    winnerLabel.textContent = '胜者：' + showdownData.winner_name + ' 牌型：' + showdownData.winner_hand_rank;
                } else if (showdownData.winner_hand_rank) {
                    winnerLabel.textContent = '牌型：' + showdownData.winner_hand_rank;
                } else {
                    winnerLabel.textContent = '胜者牌：';
                }
                winnerSection.appendChild(winnerLabel);
                
                const winnerCardsRow = document.createElement('div');
                winnerCardsRow.className = 'community-row';
                showdownData.showdown_cards.forEach(card => {
                    const img = document.createElement('img');
                    img.src = '/' + card;
                    img.className = 'card';
                    winnerCardsRow.appendChild(img);
                });
                winnerSection.appendChild(winnerCardsRow);
                communityDiv.appendChild(winnerSection);
            }
        }

        function renderPlayers(containerId, players, currentPlayerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            (players || []).forEach(player => {
                const div = document.createElement('div');
                let classes = 'player';
                if (player.is_me) {
                    classes += ' me';
                    currentUserId = player.user_id;
                }
                if (player.folded) classes += ' folded';
                if (player.user_id === currentPlayerId) classes += ' current';
                div.className = classes;

                let timerHtml = '';
                if (player.user_id === currentPlayerId) {
                    timerHtml = '<div class="player-timer">⏱ 60s</div>';
                }

                let badges = '';
                if (player.is_dealer) {
                    badges += '<div class="dealer-badge">庄</div>';
                }
                if (player.is_small_blind) {
                    badges += '<div class="sb-badge">S</div>';
                }
                if (player.is_big_blind) {
                    badges += '<div class="bb-badge">B</div>';
                }
                if (player.all_in) {
                    badges += '<div style="position:absolute;top:-5px;left:50%;transform:translateX(-50%);background:#fd7e14;color:white;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold;z-index:10;">ALL-IN</div>';
                }

                div.innerHTML = `
                    ${badges}
                    <div class="player-name">${player.nickname}${player.is_me ? ' (我)' : ''}${player.user_id === currentPlayerId ? ' 👈' : ''}</div>
                    ${timerHtml}
                    <div class="player-chips">💰 ${player.chips}</div>
                    ${player.bet > 0 ? '<div class="player-chips">下注: ' + player.bet + '</div>' : ''}
                    <div class="player-cards">
                        ${(player.cards || ['bm.png','bm.png']).map(c => '<img src="/' + c + '" class="card">').join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateControls(state) {
            const controls = document.getElementById('controls');
            
            if (!state.players) {
                controls.innerHTML = '<div style="font-size: 18px;">等待其他玩家...</div>';
                return;
            }

            const myPlayer = state.players.find(p => p.is_me);
            if (!myPlayer) {
                controls.innerHTML = '<div style="font-size: 18px;">等待游戏开始...</div>';
                return;
            }

            if (myPlayer.folded || state.phase === 'showdown') {
                controls.innerHTML = '<div style="font-size: 18px;">等待游戏继续...</div>';
                return;
            }

            if (state.current_player !== myPlayer.user_id) {
                controls.innerHTML = '<div style="font-size: 18px;">等待其他玩家...</div>';
                return;
            }

            const currentBet = state.current_bet || 0;
            const myBet = myPlayer.bet || 0;
            const callAmount = currentBet - myBet;
            const canCheck = callAmount === 0;
            const canCall = callAmount > 0 && myPlayer.chips > 0;
            minRaise = 20;
            if (currentBet > 0) {
                minRaise = currentBet;
            }
            maxRaise = myPlayer.chips - callAmount;
            const canRaise = maxRaise >= minRaise && myPlayer.chips > 0;

            let html = '';
            
            // 如果有其他玩家全下了，只显示弃牌、跟注、全下按钮
            if (hasOtherAllin) {
                html += '<button class="btn btn-fold" onclick="doAction(\'fold\')">弃牌</button>';
                if (canCall) {
                    html += `<button class="btn btn-call" onclick="doAction('call')">跟注 (${callAmount})</button>`;
                }
                html += '<button class="btn btn-allin" onclick="doAction(\'allin\')">全下</button>';
            } else {
                html += '<button class="btn btn-fold" onclick="doAction(\'fold\')">弃牌</button>';
                
                if (canCheck) {
                    html += '<button class="btn btn-check" onclick="doAction(\'check\')">过牌</button>';
                }
                
                if (canCall) {
                    html += `<button class="btn btn-call" onclick="doAction('call')">跟注 (${callAmount})</button>`;
                }
                
                if (canRaise) {
                    html += '<button class="btn btn-raise" onclick="showRaiseModal()">加注</button>';
                }
                
                html += '<button class="btn btn-allin" onclick="doAction(\'allin\')">全下</button>';
            }
            
            controls.innerHTML = html;
        }

        function showRaiseModal() {
            const modal = document.getElementById('raiseModal');
            const optionsDiv = document.getElementById('raiseOptions');
            
            optionsDiv.innerHTML = '';
            
            const raiseAmounts = [minRaise, minRaise * 2, minRaise * 4, minRaise * 8, maxRaise];
            const raiseLabels = ['1/2 Pot', 'Pot', '2x Pot', '4x Pot', 'All-In'];
            
            raiseAmounts.forEach((amount, index) => {
                if (amount > 0 && amount <= maxRaise) {
                    const btn = document.createElement('button');
                    btn.textContent = `${raiseLabels[index]} (${amount})`;
                    btn.style.cssText = `
                        padding: 12px 20px;
                        margin: 5px;
                        border: none;
                        border-radius: 8px;
                        cursor: pointer;
                        font-size: 14px;
                        font-weight: bold;
                        background: ${index === raiseAmounts.length - 1 ? '#ffc107' : '#28a745'};
                        color: ${index === raiseAmounts.length - 1 ? '#1a1a2e' : 'white'};
                    `;
                    btn.onclick = function() {
                        closeRaiseModal();
                        doAction('raise', amount);
                    };
                    optionsDiv.appendChild(btn);
                }
            });

            document.getElementById('customRaiseAmount').min = minRaise;
            document.getElementById('customRaiseAmount').max = maxRaise;
            document.getElementById('customRaiseAmount').value = minRaise;
            
            modal.style.display = 'flex';
        }

        function submitCustomRaise() {
            const amount = parseInt(document.getElementById('customRaiseAmount').value);
            if (!isNaN(amount) && amount >= minRaise && amount <= maxRaise) {
                closeRaiseModal();
                doAction('raise', amount);
            } else {
                alert(`请输入 ${minRaise} 到 ${maxRaise} 之间的金额`);
            }
        }

        function closeRaiseModal() {
            document.getElementById('raiseModal').style.display = 'none';
        }

        function doAction(action, amount) {
            console.log('doAction 被调用:', action, 'isMyTurn:', isMyTurn, 'ws:', ws);
            if (!isMyTurn || !ws) {
                console.log('doAction 被阻止: isMyTurn=', isMyTurn, 'ws=', ws);
                return;
            }

            const message = {
                event: 'game_action',
                action: action,
                amount: amount || 0
            };
            
            console.log('发送操作消息:', message);
            ws.send(JSON.stringify(message));
        }

        function updatePlayerHands(hands) {
            console.log('updatePlayerHands:', hands);
        }

        function getActionName(action) {
            const names = {
                'fold': '弃牌',
                'check': '过牌',
                'call': '跟注',
                'raise': '加注',
                'allin': '全下'
            };
            return names[action] || action;
        }

        function leaveRoom() {
            if (confirm('确定要离开房间吗？')) {
                if (ws) {
                    ws.close();
                }
                fetch('/api/room/leave', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room_id: roomId })
                }).then(() => {
                    window.location.href = '/';
                }).catch(() => {
                    window.location.href = '/';
                });
            }
        }

        function showMessage(text) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        function startTimer(seconds) {
            stopTimer();
            timeLeft = seconds;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    stopTimer();
                    doAction('fold');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer');
            const playerTimerEls = document.querySelectorAll('.player.current .player-timer');
            
            timerEl.textContent = timeLeft;
            playerTimerEls.forEach(el => {
                el.textContent = `⏱ ${timeLeft}s`;
            });

            if (timeLeft <= 10) {
                timerEl.style.color = '#dc3545';
                timerEl.style.fontWeight = 'bold';
            } else {
                timerEl.style.color = '#ffd700';
                timerEl.style.fontWeight = 'normal';
            }
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('connectionStatus');
            if (connected) {
                statusEl.textContent = '🟢 已连接';
                statusEl.className = 'connection-status connected';
            } else {
                statusEl.textContent = '🔴 未连接';
                statusEl.className = 'connection-status disconnected';
            }
        }

        function goHome() {
            window.location.href = '/';
        }

        function goBackToRoom() {
            fetch('/api/room/return', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ room_id: roomId })
            }).then(r => r.json())
              .then(data => {
                  if (data.success) {
                      window.location.href = '/room/waiting?room_id=' + roomId;
                  } else {
                      alert(data.message || '返回房间失败');
                  }
              })
              .catch(err => {
                  console.error('返回房间失败:', err);
                  window.location.href = '/room/waiting?room_id=' + roomId;
              });
        }

        function showGameOverModal() {
            const messageEl = document.getElementById('gameOverMessage');
            if (showdownData) {
                let winnerNames = '';
                if (showdownData.winners && showdownData.winners.length > 0) {
                    if (gameState && gameState.players) {
                        winnerNames = showdownData.winners.map(w => {
                            const player = gameState.players.find(p => p.user_id === w);
                            return player ? player.nickname : w;
                        }).join(', ');
                    }
                }
                const handRank = showdownData.winner_hand_rank || showdownData.best_rank || '';
                const winAmount = showdownData.win_amount || showdownData.pot || 0;

                let winnerCardsHtml = '';
                if (showdownData.showdown_cards && showdownData.showdown_cards.length > 0) {
                    winnerCardsHtml = `
                        <div style="margin: 15px 0;">
                            <div style="margin-bottom: 8px; color: #aaa;">胜者的牌：</div>
                            <div style="display: flex; justify-content: center; gap: 8px;">
                                ${showdownData.showdown_cards.map(card => `<img src="/${card}" style="width: 50px; height: 70px; border-radius: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.3);">`).join('')}
                            </div>
                        </div>
                    `;
                }

                messageEl.innerHTML = `
                    <div style="margin-bottom: 10px;">胜者：<span style="color: #ffd700; font-weight: bold;">${winnerNames}</span></div>
                    <div style="margin-bottom: 10px;">牌型：<span style="color: #ffd700; font-weight: bold;">${handRank}</span></div>
                    ${winnerCardsHtml}
                    <div>本局赢得：<span style="color: #28a745; font-weight: bold;">${winAmount}</span> 筹码</div>
                `;
            } else {
                messageEl.textContent = '游戏结束！';
            }
            document.getElementById('gameOverModal').style.display = 'flex';
        }

        document.addEventListener('DOMContentLoaded', init);

        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
;
