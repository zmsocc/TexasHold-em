<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>德州扑克</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f, #0f1f33);
            min-height: 100vh;
            color: white;
        }
        .main-container {
            display: flex;
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }
        .game-area {
            flex: 1;
            min-width: 0;
        }
        .hand-rank-panel {
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 15px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .panel-title {
            font-size: 18px;
            font-weight: bold;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .panel-content {
            display: block;
        }
        .panel-content.collapsed {
            display: none;
        }
        .hand-rank-item {
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 13px;
        }
        .hand-rank-name {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 3px;
        }
        .hand-rank-desc {
            color: #ccc;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .table {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 675px;
            margin: 0 auto;
            background: url('/zhuomian.png') center/contain no-repeat;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .players-top {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .players-bottom {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .player {
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            min-width: 130px;
            transition: all 0.3s;
        }
        .player.human {
            border: 2px solid gold;
        }
        .player.current {
            border: 3px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            animation: pulse 1s infinite;
        }
        .player.folded {
            opacity: 0.5;
        }
        .player {
            position: relative;
        }
        .dealer-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ffd700;
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            z-index: 10;
        }
        .sb-badge, .bb-badge {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            z-index: 10;
        }
        .sb-badge {
            background: #17a2b8;
            color: white;
        }
        .bb-badge {
            background: #dc3545;
            color: white;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 0, 0.7); }
        }
        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 20px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        .player-timer {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 3px;
        }
        .player-chips {
            color: #ffd700;
            margin-bottom: 5px;
        }
        .player-cards {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .card {
            width: 50px;
            height: 70px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .community {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            justify-content: center;
            align-items: flex-start;
        }
        .community-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .community-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .community-label {
            font-size: 14px;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }
        .community .card {
            width: 80px;
            height: 112px;
        }
        .pot {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .phase {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 18px;
        }
        .message {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 22px;
            max-width: 80%;
            text-align: center;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .controls {
            margin-top: 30px;
            text-align: center;
        }
        .btn {
            padding: 12px 24px;
            margin: 5px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover:not(:disabled) {
            transform: scale(1.05);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-fold {
            background: #dc3545;
            color: white;
        }
        .btn-check {
            background: #17a2b8;
            color: white;
        }
        .btn-call {
            background: #28a745;
            color: white;
        }
        .btn-raise {
            background: #ffc107;
            color: black;
        }
        .btn-allin {
            background: #fd7e14;
            color: white;
        }
        .btn-start {
            background: #007bff;
            color: white;
            font-size: 20px;
            padding: 15px 40px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e3a5f;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
        }
        .winner {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
        }
        .raise-input {
            padding: 10px;
            font-size: 16px;
            width: 100px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="game-area">
            <div class="container">
                <h1>🎴 德州扑克 🎴</h1>
                
                <div class="players-top" id="playersTop"></div>
                
                <div class="table" id="table">
                    <div class="phase" id="phase">准备开始</div>
                    <div class="pot" id="pot">底池: 0</div>
                    <div class="community" id="community"></div>
                    <div class="message" id="message"></div>
                </div>
                
                <div class="players-bottom" id="playersBottom"></div>
                
                <div class="controls" id="controls">
                    <button class="btn btn-start" onclick="startGame()">开始游戏</button>
                </div>
            </div>
        </div>
        
        <div class="hand-rank-panel">
            <div class="panel-header" onclick="togglePanel()">
                <span class="panel-title">📋 牌型说明</span>
                <button class="toggle-btn" id="toggleBtn">▼</button>
            </div>
            <div class="panel-content" id="panelContent">
                <div class="hand-rank-item">
                    <div class="hand-rank-name">1. 皇家同花顺</div>
                    <div class="hand-rank-desc">A-K-Q-J-10，同花色</div>
                </div>
                <div class="hand-rank-item">
                    <div class="hand-rank-name">2. 同花顺</div>
                    <div class="hand-rank-desc">五张连续同花色牌</div>
                </div>
                <div class="hand-rank-item">
                    <div class="hand-rank-name">3. 四条</div>
                    <div class="hand-rank-desc">四张相同点数牌</div>
                </div>
                <div class="hand-rank-item">
                    <div class="hand-rank-name">4. 满堂红</div>
                    <div class="hand-rank-desc">三条加一对</div>
                </div>
                <div class="hand-rank-item">
                    <div class="hand-rank-name">5. 同花</div>
                    <div class="hand-rank-desc">五张同花色牌</div>
                </div>
                <div class="hand-rank-item">
                    <div class="hand-rank-name">6. 顺子</div>
                    <div class="hand-rank-desc">五张连续点数牌</div>
                </div>
                <div class="hand-rank-item">
                    <div class="hand-rank-name">7. 三条</div>
                    <div class="hand-rank-desc">三张相同点数牌</div>
                </div>
                <div class="hand-rank-item">
                    <div class="hand-rank-name">8. 两对</div>
                    <div class="hand-rank-desc">两个对子</div>
                </div>
                <div class="hand-rank-item">
                    <div class="hand-rank-name">9. 一对</div>
                    <div class="hand-rank-desc">一个对子</div>
                </div>
                <div class="hand-rank-item">
                    <div class="hand-rank-name">10. 高牌</div>
                    <div class="hand-rank-desc">无以上牌型时比较最大单牌</div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="modal" style="display: none;">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        let gameState = null;
        let pollInterval = null;
        let lastStateHash = '';
        let timerInterval = null;
        let currentTimerStart = null;
        let panelCollapsed = false;
        
        function togglePanel() {
            panelCollapsed = !panelCollapsed;
            const content = document.getElementById('panelContent');
            const btn = document.getElementById('toggleBtn');
            if (panelCollapsed) {
                content.classList.add('collapsed');
                btn.textContent = '▶';
            } else {
                content.classList.remove('collapsed');
                btn.textContent = '▼';
            }
        }
        
        function hashState(state) {
            return JSON.stringify(state);
        }
        
        function startGame() {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'start' })
            }).then(() => {
                startPolling();
            });
        }
        
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(fetchState, 500);
        }
        
        function fetchState() {
            fetch('/state')
                .then(r => r.json())
                .then(state => {
                    const currentHash = hashState(state);
                    const needsUpdate = currentHash !== lastStateHash;
                    
                    if (needsUpdate) {
                        lastStateHash = currentHash;
                        gameState = state;
                        
                        if (state.currentPlayer) {
                            startTimer();
                        } else {
                            stopTimer();
                        }
                        
                        updateUI(state);
                    }
                    
                    updateTimerDisplay();
                });
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            currentTimerStart = Date.now();
            timerInterval = setInterval(updateTimerDisplay, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function updateTimerDisplay() {
            if (!gameState || !gameState.currentPlayer) return;
            
            const elapsed = Math.floor((Date.now() - currentTimerStart) / 1000);
            const timeLeft = Math.max(0, 60 - elapsed);
            
            document.querySelectorAll('.player.current .player-timer').forEach(el => {
                el.textContent = `⏱ ${timeLeft}s`;
            });
        }
        
        function updateUI(state) {
            document.getElementById('phase').textContent = state.phase || '准备开始';
            document.getElementById('pot').textContent = '底池: ' + (state.pot || 0);
            document.getElementById('message').textContent = state.message || '';
            
            const communityDiv = document.getElementById('community');
            communityDiv.innerHTML = '';
            
            if (state.showdownCards && state.showdownCards.length > 0) {
                const communitySection = document.createElement('div');
                communitySection.className = 'community-section';
                
                const communityLabel = document.createElement('div');
                communityLabel.className = 'community-label';
                communityLabel.textContent = '公共牌：';
                communitySection.appendChild(communityLabel);
                
                const communityCardsRow = document.createElement('div');
                communityCardsRow.className = 'community-row';
                (state.communityCards || ['bm.png','bm.png','bm.png','bm.png','bm.png']).forEach(card => {
                    const img = document.createElement('img');
                    img.src = '/' + card;
                    img.className = 'card';
                    communityCardsRow.appendChild(img);
                });
                communitySection.appendChild(communityCardsRow);
                communityDiv.appendChild(communitySection);
                
                const winnerSection = document.createElement('div');
                winnerSection.className = 'community-section';
                
                const winnerLabel = document.createElement('div');
                winnerLabel.className = 'community-label';
                if (state.winnerName && state.winnerHandRank) {
                    winnerLabel.textContent = '胜者：' + state.winnerName + ' 牌型：' + state.winnerHandRank;
                } else if (state.winnerHandRank) {
                    winnerLabel.textContent = '牌型：' + state.winnerHandRank;
                } else {
                    winnerLabel.textContent = '胜者牌：';
                }
                winnerSection.appendChild(winnerLabel);
                
                const winnerCardsRow = document.createElement('div');
                winnerCardsRow.className = 'community-row';
                state.showdownCards.forEach(card => {
                    const img = document.createElement('img');
                    img.src = '/' + card;
                    img.className = 'card';
                    winnerCardsRow.appendChild(img);
                });
                winnerSection.appendChild(winnerCardsRow);
                communityDiv.appendChild(winnerSection);
            } else {
                (state.communityCards || ['bm.png','bm.png','bm.png','bm.png','bm.png']).forEach(card => {
                    const img = document.createElement('img');
                    img.src = '/' + card;
                    img.className = 'card';
                    communityDiv.appendChild(img);
                });
            }
            
            const allPlayers = state.players || [];
            const topPlayers = allPlayers.slice(0, Math.ceil(allPlayers.length / 2));
            const bottomPlayers = allPlayers.slice(Math.ceil(allPlayers.length / 2));
            
            renderPlayers('playersTop', topPlayers, state.currentPlayer);
            renderPlayers('playersBottom', bottomPlayers, state.currentPlayer);
            
            renderControls(state);
            
            if (state.gameOver && state.askContinue) {
                showContinueModal(state.winnerText);
            } else if (state.askShuffle) {
                showShuffleModal();
            } else {
                hideModal();
            }
        }
        
        function renderPlayers(containerId, players, currentPlayerName) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            (players || []).forEach(player => {
                const div = document.createElement('div');
                let classes = 'player';
                if (player.isHuman) classes += ' human';
                if (player.folded) classes += ' folded';
                if (player.isCurrent) classes += ' current';
                div.className = classes;
                
                let timerHtml = '';
                if (player.isCurrent) {
                    timerHtml = '<div class="player-timer">⏱ 60s</div>';
                }
                
                let badges = '';
                if (player.isDealer) {
                    badges += '<div class="dealer-badge">庄</div>';
                }
                if (player.isSmallBlind) {
                    badges += '<div class="sb-badge">S</div>';
                }
                if (player.isBigBlind) {
                    badges += '<div class="bb-badge">B</div>';
                }
                div.innerHTML = `
                    ${badges}
                    <div class="player-name">${player.name}${player.isCurrent ? ' 👈' : ''}</div>
                    ${timerHtml}
                    <div class="player-chips">💰 ${player.chips}</div>
                    ${player.bet > 0 ? '<div class="player-chips">下注: ' + player.bet + '</div>' : ''}
                    <div class="player-cards">
                        ${(player.cards || ['bm.png','bm.png']).map(c => '<img src="/' + c + '" class="card">').join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function renderControls(state) {
            const controls = document.getElementById('controls');
            
            if (!state.waitingForInput && !state.currentPlayer && state.phase && state.phase !== '准备开始' && state.phase !== '摊牌') {
                controls.innerHTML = '<div style="font-size: 18px;">等待其他玩家...</div>';
                return;
            }
            
            if (!state.waitingForInput) {
                controls.innerHTML = '';
                return;
            }
            
            let html = '';
            
            html += '<button class="btn btn-fold" onclick="doAction(\'fold\')">弃牌</button>';
            
            if (state.canCheck) {
                html += '<button class="btn btn-check" onclick="doAction(\'check\')">过牌</button>';
            }
            
            if (state.canCall) {
                html += '<button class="btn btn-call" onclick="doAction(\'call\')">跟注 (' + state.callAmount + ')</button>';
            }
            
            if (state.canRaise) {
                html += '<button class="btn btn-raise" onclick="showRaiseModal(' + state.minRaise + ',' + state.maxRaise + ')">加注</button>';
            }
            
            html += '<button class="btn btn-allin" onclick="doAction(\'allin\')">全下</button>';
            
            controls.innerHTML = html;
        }
        
        function doAction(action, amount) {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action, amount: amount || 0 })
            });
        }
        
        function showRaiseModal(min, max) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h2>加注</h2>
                <p>范围: ${min} - ${max}</p>
                <input type="number" id="raiseAmount" class="raise-input" value="${min}" min="${min}" max="${max}">
                <br>
                <button class="btn btn-raise" onclick="submitRaise(${min}, ${max})">确定</button>
                <button class="btn btn-fold" onclick="hideModal()">取消</button>
            `;
            modal.style.display = 'flex';
        }
        
        function submitRaise(min, max) {
            let amount = parseInt(document.getElementById('raiseAmount').value);
            if (isNaN(amount) || amount < min || amount > max) {
                amount = min;
            }
            doAction('raise', amount);
            hideModal();
        }
        
        function showContinueModal(winnerText) {
            const modal = document.getElementById('modal');
            if (modal.style.display === 'flex') return;
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <div class="winner">${winnerText}</div>
                <h2>继续下一局？</h2>
                <button class="btn btn-start" onclick="doContinue()">是</button>
                <button class="btn btn-fold" onclick="doNoContinue()">否</button>
            `;
            modal.style.display = 'flex';
        }
        
        function doContinue() {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'continue' })
            });
        }
        
        function doNoContinue() {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'noContinue' })
            });
            hideModal();
            document.getElementById('controls').innerHTML = '<button class="btn btn-start" onclick="startGame()">重新开始</button>';
        }
        
        function showShuffleModal() {
            const modal = document.getElementById('modal');
            if (modal.style.display === 'flex') return;
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h2>是否更换位置？</h2>
                <button class="btn btn-start" onclick="doShuffle()">是</button>
                <button class="btn btn-check" onclick="doNoShuffle()">否</button>
            `;
            modal.style.display = 'flex';
        }
        
        function doShuffle() {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'shuffle' })
            });
            hideModal();
        }
        
        function doNoShuffle() {
            doAction('continue');
            hideModal();
        }
        
        function hideModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
