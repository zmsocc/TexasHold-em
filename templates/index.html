<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>德州扑克</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a5f, #0f1f33);
            min-height: 100vh;
            color: white;
        }
        .main-container {
            display: flex;
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }
        .game-area {
            flex: 1;
            min-width: 0;
        }
        .hand-rank-panel {
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 15px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .panel-title {
            font-size: 18px;
            font-weight: bold;
        }
        .toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .panel-content {
            display: block;
        }
        .panel-content.collapsed {
            display: none;
        }
        .hand-rank-item {
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 13px;
        }
        .hand-rank-name {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 3px;
        }
        .hand-rank-desc {
            color: #ccc;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .table {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 675px;
            margin: 0 auto;
            background: url('/zhuomian.png') center/contain no-repeat;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .players-top {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .players-bottom {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .player {
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            min-width: 130px;
            transition: all 0.3s;
        }
        .player.human {
            border: 2px solid gold;
        }
        .player.current {
            border: 3px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            animation: pulse 1s infinite;
        }
        .player.folded {
            opacity: 0.5;
        }
        .player {
            position: relative;
        }
        .dealer-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ffd700;
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            z-index: 10;
        }
        .sb-badge, .bb-badge {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 10px;
            z-index: 10;
        }
        .sb-badge {
            background: #17a2b8;
            color: white;
        }
        .bb-badge {
            background: #dc3545;
            color: white;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
            50% { box-shadow: 0 0 20px rgba(0, 255, 0, 0.7); }
        }
        .player-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 20px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        .pause-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            color: #ffd700;
            border-radius: 10px;
            cursor: pointer;
            z-index: 1000;
            display: none;
        }
        .pause-btn:hover {
            background: rgba(255, 215, 0, 0.4);
        }
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 340px;
            padding: 10px 20px;
            font-size: 16px;
            background: rgba(220, 53, 69, 0.2);
            border: 2px solid #dc3545;
            color: #dc3545;
            border-radius: 10px;
            cursor: pointer;
            z-index: 1000;
        }
        .logout-btn:hover {
            background: rgba(220, 53, 69, 0.4);
        }
        .pause-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            border-radius: 200px;
        }
        .pause-modal-content {
            background: #1e3a5f;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ffd700;
        }
        .pause-modal h2 {
            color: #ffd700;
            margin-bottom: 30px;
        }
        .table-modal {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 200px;
        }
        .table-modal-content {
            background: #1e3a5f;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 350px;
        }
        .player-timer {
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 3px;
        }
        .player-chips {
            color: #ffd700;
            margin-bottom: 5px;
        }
        .player-cards {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .card {
            width: 50px;
            height: 70px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .community {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            justify-content: center;
            align-items: flex-start;
        }
        .community-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .community-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .community-label {
            font-size: 14px;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }
        .community .card {
            width: 80px;
            height: 112px;
        }
        .pot {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .phase {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 18px;
        }
        .message {
            position: absolute;
            bottom: 0%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 22px;
            max-width: 80%;
            text-align: center;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .controls {
            margin-top: 30px;
            text-align: center;
        }
        .btn {
            padding: 12px 24px;
            margin: 5px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover:not(:disabled) {
            transform: scale(1.05);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-fold {
            background: #dc3545;
            color: white;
        }
        .btn-check {
            background: #17a2b8;
            color: white;
        }
        .btn-call {
            background: #28a745;
            color: white;
        }
        .btn-raise {
            background: #ffc107;
            color: black;
        }
        .btn-allin {
            background: #fd7e14;
            color: white;
        }
        .btn-start {
            background: #007bff;
            color: white;
            font-size: 20px;
            padding: 15px 40px;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e3a5f;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
        }
        .winner {
            font-size: 24px;
            color: #ffd700;
            margin-bottom: 20px;
        }
        .raise-input {
            padding: 10px;
            font-size: 16px;
            width: 100px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        h1 {
            text-align: center;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .mode-selection {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            padding: 40px;
        }
        .mode-btn {
            padding: 20px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            min-width: 250px;
        }
        .mode-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .player-count-grid {
             display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
            margin: 0 auto;
            position: absolute;
            bottom: 120px;
            left: 40%;
            transform: translateX(-50%);
            background: rgba(70, 130, 180, 0.9);
            border-radius: 10px;
            z-index: 100;
            overflow: hidden;
        }
        .player-count-grid h2 {
            width: 100%;
            text-align: center;
            margin: 0;
            padding: 15px 0;
            font-size: 20px;
            color: #fff;
            background: rgba(70, 130, 180, 0.9);
        }
        .player-count-buttons {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px 20px;
            background: rgba(100, 80, 150, 0.8);
        }
        .count-btn {
            padding: 12px 18px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .count-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
        .player-count-grid .back-btn {
            width: 100%;
            margin: 0;
            padding: 12px 0;
            font-size: 16px;
            background: rgba(70, 130, 180, 0.9);
            border: none;
            border-radius: 0;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .player-count-grid .back-btn:hover {
            background: rgba(90, 150, 200, 1);
        }
        .back-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #fff;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸ 暂停</button>

    <div class="main-container">
        <div class="game-area">

                <div class="players-top" id="playersTop"></div>

                    <div class="community" id="community" style="display: none;"></div>
                    <div class="message" id="message" style="display: none;"></div>
                    <div class="table-modal" id="tableModal" style="display: none;">
                        <div class="table-modal-content" id="tableModalContent"></div>
                    </div>
                    <div class="pause-modal" id="pauseModal">
                        <div class="pause-modal-content">

                                <button class="btn btn-start" onclick="restartFromPause()">重新开始</button>

                    </div>

                        <h2>自定义房间</h2>

                            <button class="btn btn-start" onclick="createRoom()">创建房间</button>

    <script src="/static/js/auth.js"></script>
    <script>
        let gameState = null;
        let pollInterval = null;
        let lastStateHash = '';
        let timerInterval = null;
        let currentTimerStart = null;
        let panelCollapsed = false;
        let isPaused = false;
        let roomIdFromUrl = null;

        // 页面加载时检查是否有room_id参数或需要重连
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            roomIdFromUrl = urlParams.get('room_id');
            if (roomIdFromUrl) {
                // 从房间页面跳转过来，自动开始游戏
                setTimeout(() => {
                    startGameFromRoom(roomIdFromUrl);
                }, 500);
            } else {
                // 检查是否需要重连到房间
                checkReconnect();
            }
        });
        
        function checkReconnect() {
            fetch('/api/room/check_reconnect')
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.in_room) {
                        if (data.is_gaming) {
                            // 房间在游戏中，直接进入游戏
                            window.location.href = '/room/game?room_id=' + data.room_id;
                        } else {
                            // 房间在等待中，提示是否重连
                            showReconnectModal(data.room_id);
                        }
                    }
                })
                .catch(err => {
                    console.error('检查重连失败:', err);
                });
        }
        
        function showReconnectModal(roomId) {
            const modal = document.createElement('div');
            modal.id = 'reconnectModal';
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2 style="color: #ffd700; margin-bottom: 20px;">断线重连</h2>
                    <p style="margin-bottom: 25px;">你已在${roomId}房间中，是否需要重新进入？</p>
                    <div style="display: flex; gap: 15px; justify-content: center;">
                        <button class="btn btn-call" onclick="confirmReconnect('${roomId}')">是</button>
                        <button class="btn btn-fold" onclick="declineReconnect('${roomId}')">否</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function confirmReconnect(roomId) {
            const modal = document.getElementById('reconnectModal');
            if (modal) {
                document.body.removeChild(modal);
            }
            window.location.href = '/room/waiting?room_id=' + roomId;
        }
        
        function declineReconnect(roomId) {
            const modal = document.getElementById('reconnectModal');
            if (modal) {
                document.body.removeChild(modal);
            }
            // 调用离开房间API
            fetch('/api/room/leave', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ room_id: roomId })
            });
        }

        function startGameFromRoom(roomId) {
            // 重置前端状态
            gameState = null;
            lastStateHash = '';
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = null;
            stopTimer();

            // 重置UI
            document.getElementById('phase').textContent = '准备开始';
            document.getElementById('pot').textContent = '底池: 0';
            document.getElementById('message').style.display = 'none';
            document.getElementById('community').style.display = 'none';
            document.getElementById('community').innerHTML = '';
            document.getElementById('playersTop').innerHTML = '';
            document.getElementById('playersBottom').innerHTML = '';
            document.getElementById('pauseBtn').style.display = 'block';
            hideModal();

            // 调用开始游戏接口，带上room_id
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'start', room_id: roomId })
            }).then(() => {
                startPolling();
            });
        }

        function togglePause() {
            isPaused = !isPaused;
            const pauseModal = document.getElementById('pauseModal');
            if (isPaused) {
                pauseModal.style.display = 'flex';
                // 暂停时停止轮询和计时器
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = null;
                stopTimer();
            } else {
                pauseModal.style.display = 'none';
                // 继续时恢复轮询
                startPolling();
            }
        }
        
        function restartFromPause() {
            // 关闭暂停弹框
            isPaused = false;
            document.getElementById('pauseModal').style.display = 'none';
            // 先停止当前游戏
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = null;
            stopTimer();
            // 重置游戏状态
            gameState = null;
            lastStateHash = '';
            // 调用开始游戏函数
            startGame();
        }

        // 登出功能
        async function logout() {
            if (!confirm('确定要登出吗？登出后需要重新输入账号密码才能登录。')) {
                return;
            }

            // 停止轮询
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = null;
            stopTimer();

            // 使用authManager登出
            await authManager.logout();
        }

        function goToHome() {
            // 关闭暂停弹框
            isPaused = false;
            document.getElementById('pauseModal').style.display = 'none';
            // 停止轮询
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = null;
            stopTimer();
            // 重置游戏状态
            gameState = null;
            lastStateHash = '';
            // 重置UI到初始状态
            document.getElementById('phase').style.display = 'none';
            document.getElementById('phase').textContent = '准备开始';
            document.getElementById('pot').style.display = 'none';
            document.getElementById('pot').textContent = '底池: 0';
            document.getElementById('message').style.display = 'none';
            document.getElementById('community').style.display = 'none';
            document.getElementById('community').innerHTML = '';
            document.getElementById('playersTop').innerHTML = '';
            document.getElementById('playersBottom').innerHTML = '';
            document.getElementById('pauseBtn').style.display = 'none';
            // 重置controls内容
            document.getElementById('controls').innerHTML = `
                <div class="mode-selection" id="modeSelection">
                    <h2>选择游戏模式</h2>
                    <button class="mode-btn" onclick="showAIOptions()">🤖 人机局</button>
                    <button class="mode-btn" onclick="showRoomOptions()">🏠 自定义房间</button>
                </div>
                <div id="roomOptions" style="display: none; text-align: center;">
                    <h2>自定义房间</h2>
                    <div style="margin: 20px 0;">
                        <button class="btn btn-start" onclick="createRoom()">创建房间</button>
                    </div>
                    <div style="margin: 20px 0;">
                        <input type="text" id="roomCodeInput" placeholder="输入房间码" style="padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin-right: 10px;">
                        <button class="btn btn-check" onclick="joinRoomByCode()">加入房间</button>
                    </div>
                    <button class="back-btn" onclick="showModeSelection()" style="width: 110px;">返回</button>
                </div>
            `;
            // 显示模式选择界面
            showModeSelection();
        }
        
        function togglePanel() {
            panelCollapsed = !panelCollapsed;
            const content = document.getElementById('panelContent');
            const btn = document.getElementById('toggleBtn');
            if (panelCollapsed) {
                content.classList.add('collapsed');
                btn.textContent = '▶';
            } else {
                content.classList.remove('collapsed');
                btn.textContent = '▼';
            }
        }
        
        function hashState(state) {
            return JSON.stringify(state);
        }
        
        // 游戏模式选择
        function showModeSelection() {
            document.getElementById('modeSelection').style.display = 'flex';
            document.getElementById('aiOptions').style.display = 'none';
            document.getElementById('roomOptions').style.display = 'none';
        }
        
        function showAIOptions() {
            document.getElementById('modeSelection').style.display = 'none';
            document.getElementById('aiOptions').style.display = 'flex';
            document.getElementById('roomOptions').style.display = 'none';
        }
        
        function showRoomOptions() {
            document.getElementById('modeSelection').style.display = 'none';
            document.getElementById('aiOptions').style.display = 'none';
            document.getElementById('roomOptions').style.display = 'block';
        }
        
        // 开始人机局游戏
        function startAIGame(playerCount) {
            // 重置前端状态
            gameState = null;
            lastStateHash = '';
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = null;
            stopTimer();

            // 重置UI
            document.getElementById('aiOptions').style.display = 'none';
            document.getElementById('phase').textContent = '准备开始';
            document.getElementById('pot').textContent = '底池: 0';
            document.getElementById('message').style.display = 'none';
            document.getElementById('community').style.display = 'none';
            document.getElementById('community').innerHTML = '';
            document.getElementById('playersTop').innerHTML = '';
            document.getElementById('playersBottom').innerHTML = '';
            document.getElementById('pauseBtn').style.display = 'block';
            hideModal();
            
            // 先设置人数，再开始游戏
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'set_ai_count', amount: playerCount })
            }).then(() => {
                return fetch('/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'start', amount: playerCount })
                });
            }).then(() => {
                startPolling();
            });
        }
        
        // 创建房间
        function createRoom() {
            window.location.href = '/room/create';
        }

        // 通过房间码加入房间
        function joinRoomByCode() {
            const code = document.getElementById('roomCodeInput').value.trim();
            if (!code) {
                alert('请输入房间码');
                return;
            }
            window.location.href = '/room/join?code=' + code;
        }
        
        function startGame() {
            // 重置前端状态
            gameState = null;
            lastStateHash = '';
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = null;
            stopTimer();
            
            // 重置UI
            document.getElementById('phase').textContent = '准备开始';
            document.getElementById('pot').textContent = '底池: 0';
            document.getElementById('message').style.display = 'none';
            document.getElementById('community').style.display = 'none';
            document.getElementById('community').innerHTML = '';
            document.getElementById('playersTop').innerHTML = '';
            document.getElementById('playersBottom').innerHTML = '';
            document.getElementById('pauseBtn').style.display = 'block';
            hideModal();
            
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'start' })
            }).then(() => {
                startPolling();
            });
        }
        
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(fetchState, 500);
        }
        
        function fetchState() {
            fetch('/state')
                .then(r => r.json())
                .then(state => {
                    const currentHash = hashState(state);
                    const needsUpdate = currentHash !== lastStateHash;
                    
                    if (needsUpdate) {
                        lastStateHash = currentHash;
                        gameState = state;
                        
                        if (state.currentPlayer) {
                            startTimer();
                        } else {
                            stopTimer();
                        }
                        
                        updateUI(state);
                    }
                    
                    updateTimerDisplay();
                });
        }

        function goHome() {
            window.location.href = '/';
        }

        function goBackToRoom() {
            // 返回房间页面，需要带上room_id
            if (roomIdFromUrl) {
                window.location.href = '/room/waiting?room_id=' + roomIdFromUrl;
            } else {
                // 如果没有room_id，返回首页
                window.location.href = '/';
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            currentTimerStart = Date.now();
            timerInterval = setInterval(updateTimerDisplay, 1000);
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function updateTimerDisplay() {
            if (!gameState || !gameState.currentPlayer) return;
            
            const elapsed = Math.floor((Date.now() - currentTimerStart) / 1000);
            const timeLeft = Math.max(0, 60 - elapsed);
            
            document.querySelectorAll('.player.current .player-timer').forEach(el => {
                el.textContent = `⏱ ${timeLeft}s`;
            });
        }
        
        function updateUI(state) {
            document.getElementById('phase').textContent = state.phase || '准备开始';
            document.getElementById('pot').textContent = '底池: ' + (state.pot || 0);
            
            const messageDiv = document.getElementById('message');
            const communityDiv = document.getElementById('community');
            
            // 如果游戏还没开始，隐藏message和community
            if (!state.phase || state.phase === '准备开始') {
                messageDiv.style.display = 'none';
                communityDiv.style.display = 'none';
            } else {
                communityDiv.style.display = 'flex';
                if (state.message && state.message !== '') {
                    messageDiv.textContent = state.message;
                    messageDiv.style.display = 'block';
                } else {
                    messageDiv.style.display = 'none';
                }
            }
            
            // 清空公共牌区域
            communityDiv.innerHTML = '';
            
            // 只显示公共牌（最多5张）
            const cardsToShow = state.communityCards || ['bm.png','bm.png','bm.png','bm.png','bm.png'];
            // 限制最多显示5张牌
            const limitedCards = cardsToShow.slice(0, 5);
            limitedCards.forEach(card => {
                const img = document.createElement('img');
                img.src = '/' + card;
                img.className = 'card';
                communityDiv.appendChild(img);
            });
            
            // 摊牌阶段显示胜者牌
            if (state.phase === '摊牌' && state.showdownCards && state.showdownCards.length > 0) {
                const winnerSection = document.createElement('div');
                winnerSection.className = 'community-section';
                winnerSection.style.marginTop = '10px';
                
                const winnerLabel = document.createElement('div');
                winnerLabel.className = 'community-label';
                if (state.winnerName && state.winnerHandRank) {
                    winnerLabel.textContent = '胜者：' + state.winnerName + ' 牌型：' + state.winnerHandRank;
                } else if (state.winnerHandRank) {
                    winnerLabel.textContent = '牌型：' + state.winnerHandRank;
                } else {
                    winnerLabel.textContent = '胜者牌：';
                }
                winnerSection.appendChild(winnerLabel);
                
                const winnerCardsRow = document.createElement('div');
                winnerCardsRow.className = 'community-row';
                state.showdownCards.forEach(card => {
                    const img = document.createElement('img');
                    img.src = '/' + card;
                    img.className = 'card';
                    winnerCardsRow.appendChild(img);
                });
                winnerSection.appendChild(winnerCardsRow);
                communityDiv.appendChild(winnerSection);
            }
            
            const allPlayers = state.players || [];
            const topPlayers = allPlayers.slice(0, Math.ceil(allPlayers.length / 2));
            const bottomPlayers = allPlayers.slice(Math.ceil(allPlayers.length / 2));
            
            renderPlayers('playersTop', topPlayers, state.currentPlayer);
            renderPlayers('playersBottom', bottomPlayers, state.currentPlayer);
            
            renderControls(state);
            
            if (state.noChips) {
                showNoChipsModal();
            } else if (state.gameOver && state.askContinue) {
                showContinueModal(state.winnerText);
            } else if (state.askShuffle) {
                showShuffleModal();
            } else {
                hideModal();
            }
        }
        
        function renderPlayers(containerId, players, currentPlayerName) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            (players || []).forEach(player => {
                const div = document.createElement('div');
                let classes = 'player';
                if (player.isHuman) classes += ' human';
                if (player.folded) classes += ' folded';
                if (player.isCurrent) classes += ' current';
                div.className = classes;
                
                let timerHtml = '';
                if (player.isCurrent) {
                    timerHtml = '<div class="player-timer">⏱ 60s</div>';
                }
                
                let badges = '';
                if (player.isDealer) {
                    badges += '<div class="dealer-badge">庄</div>';
                }
                if (player.isSmallBlind) {
                    badges += '<div class="sb-badge">S</div>';
                }
                if (player.isBigBlind) {
                    badges += '<div class="bb-badge">B</div>';
                }
                div.innerHTML = `
                    ${badges}
                    <div class="player-name">${player.name}${player.isCurrent ? ' 👈' : ''}</div>
                    ${timerHtml}
                    <div class="player-chips">💰 ${player.chips}</div>
                    ${player.bet > 0 ? '<div class="player-chips">下注: ' + player.bet + '</div>' : ''}
                    <div class="player-cards">
                        ${(player.cards || ['bm.png','bm.png']).map(c => '<img src="/' + c + '" class="card">').join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function renderControls(state) {
            const controls = document.getElementById('controls');

            // 游戏结束且不再继续，显示重新开始按钮
            if (state.gameOver && !state.askContinue && !state.askShuffle) {
                // 房间模式显示返回首页和返回房间按钮
                if (state.gameMode === 'room') {
                    controls.innerHTML = '<button class="btn btn-check" onclick="goHome()">返回首页</button><button class="btn btn-start" onclick="goBackToRoom()" style="margin-left: 10px;">返回房间</button>';
                } else {
                    controls.innerHTML = '<button class="btn btn-start" onclick="startGame()">重新开始</button><button class="btn btn-check" onclick="goHome()" style="margin-left: 10px;">返回首页</button>';
                }
                return;
            }

            if (!state.waitingForInput && !state.currentPlayer && state.phase && state.phase !== '准备开始' && state.phase !== '摊牌') {
                controls.innerHTML = '<div style="font-size: 18px;">等待其他玩家...</div>';
                return;
            }

            if (!state.waitingForInput) {
                controls.innerHTML = '';
                return;
            }
            
            let html = '';
            
            html += '<button class="btn btn-fold" onclick="doAction(\'fold\')">弃牌</button>';
            
            if (state.canCheck) {
                html += '<button class="btn btn-check" onclick="doAction(\'check\')">过牌</button>';
            }
            
            if (state.canCall) {
                html += '<button class="btn btn-call" onclick="doAction(\'call\')">跟注 (' + state.callAmount + ')</button>';
            }
            
            if (state.canRaise) {
                html += '<button class="btn btn-raise" onclick="showRaiseModal(' + state.minRaise + ',' + state.maxRaise + ')">加注</button>';
            }
            
            html += '<button class="btn btn-allin" onclick="doAction(\'allin\')">全下</button>';
            
            controls.innerHTML = html;
        }
        
        function doAction(action, amount) {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action, amount: amount || 0 })
            });
        }
        
        function showRaiseModal(min, max) {
            const modal = document.getElementById('tableModal');
            const content = document.getElementById('tableModalContent');
            content.innerHTML = `
                <h2>加注</h2>
                <p>范围: ${min} - ${max}</p>
                <input type="number" id="raiseAmount" class="raise-input" value="${min}" min="${min}" max="${max}">
                <br>
                <button class="btn btn-raise" onclick="submitRaise(${min}, ${max})">确定</button>
                <button class="btn btn-fold" onclick="hideModal()">取消</button>
            `;
            modal.style.display = 'flex';
        }
        
        function submitRaise(min, max) {
            let amount = parseInt(document.getElementById('raiseAmount').value);
            if (isNaN(amount) || amount < min || amount > max) {
                amount = min;
            }
            doAction('raise', amount);
            hideModal();
        }
        
        function showContinueModal(winnerText) {
            const modal = document.getElementById('tableModal');
            if (modal.style.display === 'flex') return;
            const content = document.getElementById('tableModalContent');
            content.innerHTML = `
                <div class="winner">${winnerText}</div>
                <h2>继续下一局？</h2>
                <button class="btn btn-start" onclick="doContinue()">是</button>
                <button class="btn btn-fold" onclick="doNoContinue()">否</button>
            `;
            modal.style.display = 'flex';
        }
        
        function doContinue() {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'continue' })
            });
        }
        
        function doNoContinue() {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'noContinue' })
            });
            hideModal();
            document.getElementById('controls').innerHTML = '<button class="btn btn-start" onclick="startGame()">重新开始</button><button class="btn btn-check" onclick="goHome()" style="margin-left: 10px;">返回首页</button>';
        }
        
        function showShuffleModal() {
            const modal = document.getElementById('tableModal');
            if (modal.style.display === 'flex') return;
            const content = document.getElementById('tableModalContent');
            content.innerHTML = `
                <h2>是否更换位置？</h2>
                <button class="btn btn-start" onclick="doShuffle()">是</button>
                <button class="btn btn-check" onclick="doNoShuffle()">否</button>
            `;
            modal.style.display = 'flex';
        }
        
        function doShuffle() {
            fetch('/action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'shuffle' })
            });
            hideModal();
        }
        
        function doNoShuffle() {
            doAction('continue');
            hideModal();
        }
        
        function showNoChipsModal() {
            const modal = document.getElementById('tableModal');
            if (modal.style.display === 'flex') return;
            const content = document.getElementById('tableModalContent');
            content.innerHTML = `
                <div class="winner">您已无筹码，无法继续游戏！</div>
                <h2>请返回开始界面</h2>
                <button class="btn btn-start" onclick="resetGame()">确认</button>
            `;
            modal.style.display = 'flex';
        }
        
        function resetGame() {
            window.location.reload();
        }
        
        function hideModal() {
            document.getElementById('tableModal').style.display = 'none';
        }
    </script>
</body>
</html>
